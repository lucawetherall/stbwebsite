name: CI

# Verifies pull requests before they can be merged to main (which auto-deploys to
# production via deploy.yml). Runs the same checks an author should run locally:
# type-check, unit tests, and a full static build. Keep this distinct from deploy.yml —
# CI verifies PRs; deploy.yml ships main.
#
# Optional but recommended: make this a required status check on `main`
# (GitHub → Settings → Branches → branch protection) so a red build can't be merged.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (astro check)
        run: npx astro check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
