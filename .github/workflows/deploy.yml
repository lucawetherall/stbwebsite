name: Deploy to Cloudflare Pages

# Builds the Astro site and deploys it to the `barnabites` Cloudflare Pages project
# on every push to main. This is what makes a CMS "Publish" (which commits to main)
# refresh the live site automatically — replacing Cloudflare's native Git integration.
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account ID
#
# At go-live, if the project/account moves to a church-owned Cloudflare account,
# update these secrets and the --project-name below.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=barnabites --branch=main
